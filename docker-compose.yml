networks:
  rotr:
    driver: bridge

volumes:
  kafka-data-1:
  kafka-data-2:
  kafka-data-3:
  zookeeper-data:

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
    networks: [rotr]

  kafka-1:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka-1
    depends_on: [zookeeper]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-1:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG4J_ROOT_LOGLEVEL: WARN
    volumes:
      - kafka-data-1:/var/lib/kafka/data
    networks: [rotr]
    ports:
      - "9092:9092"

  kafka-2:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka-2
    depends_on: [zookeeper]
    environment:
      KAFKA_BROKER_ID: 2
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-2:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9093
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG4J_ROOT_LOGLEVEL: WARN
    volumes:
      - kafka-data-2:/var/lib/kafka/data
    networks: [rotr]
    ports:
      - "9093:9093"

  kafka-3:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka-3
    depends_on: [zookeeper]
    environment:
      KAFKA_BROKER_ID: 3
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-3:9094
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9094
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG4J_ROOT_LOGLEVEL: WARN
    volumes:
      - kafka-data-3:/var/lib/kafka/data
    networks: [rotr]
    ports:
      - "9094:9094"

  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.0
    container_name: schema-registry
    depends_on: [kafka-1, kafka-2, kafka-3]
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka-1:9092,kafka-2:9093,kafka-3:9094
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      SCHEMA_REGISTRY_LOG4J_ROOT_LOGLEVEL: WARN
    networks: [rotr]
    ports:
      - "8081:8081"

  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka-init
    depends_on: [kafka-1, kafka-2, kafka-3]
    entrypoint: ["/bin/bash", "/scripts/init-topics.sh"]
    volumes:
      - ./kafka:/scripts:ro
    networks: [rotr]

  schema-init:
    image: python:3.12-alpine
    container_name: schema-init
    depends_on:
      schema-registry:
        condition: service_started
      kafka-init:
        condition: service_completed_successfully
    environment:
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
    volumes:
      - ./kafka:/schemas:ro
    command: ["python", "/schemas/register_schemas.py"]
    networks: [rotr]

  kafka-streams:
    build:
      context: ./kafka/streams
      dockerfile: Dockerfile
    container_name: kafka-streams
    depends_on:
      schema-registry:
        condition: service_started
      schema-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BROKERS: kafka-1:9092,kafka-2:9093,kafka-3:9094
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      CONFIG_DIR: /app/config
      SCHEMA_DIR: /app/schemas
    volumes:
      - ./config:/app/config:ro
      - ./kafka/schemas:/app/schemas:ro
    networks: [rotr]

  go-1:
    build:
      context: ./option-b
      dockerfile: Dockerfile
    container_name: go-1
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      schema-registry:
        condition: service_started
      schema-init:
        condition: service_completed_successfully
      kafka-streams:
        condition: service_started
    environment:
      KAFKA_BROKERS: kafka-1:9092,kafka-2:9093,kafka-3:9094
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      CONSUMER_GROUP: rotr-game-engine
      STATE_CONSUMER_GROUP: rotr-state-go-1
      INSTANCE_ID: go-1
      LEADER_INSTANCE_ID: go-1
      HTTP_PORT: "8080"
      CONFIG_PATH: /app/config
    volumes:
      - ./config:/app/config:ro
    networks: [rotr]
    ports:
      - "8080:8080"

  go-2:
    build:
      context: ./option-b
      dockerfile: Dockerfile
    container_name: go-2
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      schema-registry:
        condition: service_started
      schema-init:
        condition: service_completed_successfully
      kafka-streams:
        condition: service_started
    environment:
      KAFKA_BROKERS: kafka-1:9092,kafka-2:9093,kafka-3:9094
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      CONSUMER_GROUP: rotr-game-engine
      STATE_CONSUMER_GROUP: rotr-state-go-2
      INSTANCE_ID: go-2
      LEADER_INSTANCE_ID: go-1
      HTTP_PORT: "8080"
      CONFIG_PATH: /app/config
    volumes:
      - ./config:/app/config:ro
    networks: [rotr]
    ports:
      - "8082:8080"

  go-3:
    build:
      context: ./option-b
      dockerfile: Dockerfile
    container_name: go-3
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      schema-registry:
        condition: service_started
      schema-init:
        condition: service_completed_successfully
      kafka-streams:
        condition: service_started
    environment:
      KAFKA_BROKERS: kafka-1:9092,kafka-2:9093,kafka-3:9094
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      CONSUMER_GROUP: rotr-game-engine
      STATE_CONSUMER_GROUP: rotr-state-go-3
      INSTANCE_ID: go-3
      LEADER_INSTANCE_ID: go-1
      HTTP_PORT: "8080"
      CONFIG_PATH: /app/config
    volumes:
      - ./config:/app/config:ro
    networks: [rotr]
    ports:
      - "8083:8080"

  nginx:
    image: nginx:alpine
    container_name: nginx
    depends_on: [go-1, go-2, go-3]
    networks: [rotr]
    ports:
      - "80:80"
      - "8888:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ui:/usr/share/nginx/html:ro
