events {}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    upstream go_backend {
        # Sticky sessions not needed — Go instances are stateless
        # All authoritative state is in Kafka KTable stores
        least_conn;
        server go-1:8080;
        server go-2:8080;
        server go-3:8080;
    }

    server {
        listen 80;

        # Static UI files
        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
        }

        # SSE connections — disable buffering for real-time streaming
        location /events {
            proxy_pass http://go_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;
            proxy_read_timeout 3600s;
        }

        # API endpoints
        location /order {
            proxy_pass http://go_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /game/ {
            proxy_pass http://go_backend;
            proxy_set_header Host $host;
        }

        location /analysis/ {
            proxy_pass http://go_backend;
            proxy_set_header Host $host;
        }

        location /orders/ {
            proxy_pass http://go_backend;
            proxy_set_header Host $host;
        }

        location /health {
            proxy_pass http://go_backend;
        }
    }
}
